# docker-compose.yml
# version: "3.9"

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Base image — built once, reused by fastapi + bentoml
  # ═══════════════════════════════════════════════════════════════════════════
  base:
    build:
      context: .
      dockerfile: docker/base/Dockerfile
    image: ml_platform_base
    command: ["true"]
    # profiles: ["build-only"]

  # ============================================
  # MLflow (FIXED: Removed pip install at runtime)
  # ============================================
  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    container_name: mlflow
    # command: |
    #   bash -c "
    #     mkdir -p /mlflow /mlflow-artifacts &&
    #     mlflow server
    #       --host 0.0.0.0
    #       --port 5000
    #       --default-artifact-root /mlflow-artifacts
    #       --backend-store-uri sqlite:///mlflow/mlflow.db
    #   "
    ports:
      - "5000:5000"
    volumes:
      - mlflow_db:/mlflow
      - mlflow_artifacts:/mlflow-artifacts
    networks:
      - ml-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s


  # ============================================
  # BentoML
  # ============================================
  bentoml:
    build:
      context: .
      dockerfile: docker/bentoml/Dockerfile
    image: ml_platform_bentoml
    container_name: bentoml
    # command: |
    #   bash -c "
    #     sleep 15 &&
    #     (python scripts/run_pipeline.py > /app/logs/pipeline.log 2>&1 &) &&
    #     bentoml serve src.serving.bentoml_service:MLPlatformService --port 3000 --host 0.0.0.0
    #   "
    ports:
      - "3000:3000"
    environment:
      # PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: development
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - shared_artifacts:/app/artifacts
      - shared_logs:/app/logs
    depends_on:
      base:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - ml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ============================================
  # FastAPI
  # ============================================
  fastapi:
    build:
      context: .
      dockerfile: docker/fastapi/Dockerfile
    image: ml_platform_fastapi
    container_name: fastapi
    # command: |
    #   uvicorn src.api.app:app
    #     --host 0.0.0.0
    #     --port 8000
    #     --reload
    ports:
      - "8000:8000"
    environment:
      # PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: development
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      MLFLOW_TRACKING_URI: http://mlflow:5000
      BENTOML_URL: http://bentoml:3000
      API_KEY_PREDICT: predict-key-change-in-prod
      API_KEY_ADMIN: admin-key-change-in-prod
      API_KEY_READONLY: readonly-key-change-in-prod
    volumes:
      - shared_artifacts:/app/artifacts
      - shared_logs:/app/logs
    depends_on:
      base:
        condition: service_completed_successfully
      bentoml:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - ml-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # OpenTelemetry Collector — receives traces from services
  # ═══════════════════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics from collector itself
    volumes:
      - ./monitoring/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    networks:
      - ml-network
    depends_on:
      - jaeger
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # Jaeger — distributed trace storage + UI
  # ═══════════════════════════════════════════════════════════════════════════
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC ingestion (from collector)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: "memory"
    networks:
      - ml-network
    restart: unless-stopped
  # ============================================
  # Prometheus
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ml-network
    restart: unless-stopped

  # ============================================
  # Grafana (FIXED: Removed duplicate dashboards mount)
  # ============================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ml-network
    restart: unless-stopped

  # ============================================
  # PostgreSQL for Airflow (NEW - REQUIRED for 3.2.1)
  # ============================================
  postgres-airflow:
    image: postgres:15-alpine
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ml-network
    restart: unless-stopped

  # ============================================
  # Airflow Init (One-time DB setup)
  # ============================================
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: ml_platform_airflow
    container_name: airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/orchestration
      AIRFLOW__API__SECRET_KEY: change-me
      PYTHONPATH: /app:/opt/airflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - shared_artifacts:/app/artifacts
      - airflow_data:/opt/airflow
    depends_on:
      postgres-airflow:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - ml-network
    entrypoint: |
      bash -c '
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@ml.com 2>/dev/null || true
        echo "Init complete"
      '
    restart: "no"

  # ============================================
  # Airflow API Server (was "webserver" in 2.x)
  # ============================================
  airflow-webserver:
    image: ml_platform_airflow
    container_name: airflow-api-server
    command: |
      bash -c "
        echo 'Starting Airflow API Server...' &&
        airflow api-server --port 8080
      "
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/orchestration
      AIRFLOW__WEBSERVER__SECRET_KEY: change-me
      PYTHONPATH: /app:/opt/airflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - shared_artifacts:/app/artifacts
      - airflow_data:/opt/airflow
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    networks:
      - ml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s

  # ============================================
  # Airflow Scheduler
  # ============================================
  airflow-scheduler:
    image: ml_platform_airflow
    container_name: airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /app/src/orchestration
      PYTHONPATH: /app:/opt/airflow
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - shared_artifacts:/app/artifacts
      - airflow_data:/opt/airflow
    depends_on:
      postgres-airflow:
          condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-webserver:
        condition: service_healthy
    networks:
      - ml-network
    restart: unless-stopped

volumes:
  mlflow_db:
  mlflow_artifacts:
  prometheus_data:
  grafana_data:
  airflow_data:
  postgres_airflow_data:
  shared_artifacts:   # ← all ML containers share this
  shared_logs:        # ← all ML containers log here

networks:
  ml-network:
    driver: bridge